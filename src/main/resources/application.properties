server.address=0.0.0.0
server.port=8080

# Banco de Dados

# 🔹 USAR QUANDO RODAR LOCAL (fora do Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/AuthAssisten
spring.datasource.username=admin
spring.datasource.password=admin123

# 🔹 USAR QUANDO RODAR DENTRO DO DOCKER (descomentar o serviço app)
#spring.datasource.url=jdbc:postgresql://postgres:5432/AuthAssisten
#spring.datasource.username=admin
#spring.datasource.password=admin123

# 🔹 CONFIG ANTIGA (mantida)
#spring.datasource.url=jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DATABASE}
#spring.datasource.username=${DATABASE_USERNAME}
#spring.datasource.password=${DATABASE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=chaveSecretaSuperSeguraParaJWT123456789
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG