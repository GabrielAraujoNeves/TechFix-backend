services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: AuthAssisten
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
